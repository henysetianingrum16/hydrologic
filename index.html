<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#16335f" />
  <title>HydroLogic — Monitoring Hidrologi</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/icons/favicon.ico" />
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- App bar -->
  <header class="appbar" id="appbar">
    <img src="assets/icons/icon-192.png" alt="HydroLogic" class="appbar__logo" />
    <div class="appbar__title">
      <strong>HydroLogic</strong>
      <span id="appbar-sub">Monitoring Hidrologi</span>
    </div>
    <div class="sync-pill" id="sync-pill" title="Status koneksi & sinkronisasi">
      <span class="sync-dot" id="sync-dot"></span>
      <span id="sync-text">—</span>
    </div>
  </header>

  <main id="view"><!-- views injected here --></main>

  <!-- Bottom navigation -->
  <nav class="bottomnav" id="bottomnav">
    <button class="navbtn is-active" data-route="home">
      <span class="navbtn__ico">🏠</span><span>Beranda</span>
    </button>
    <button class="navbtn" data-route="discharge">
      <span class="navbtn__ico">🌊</span><span>Debit</span>
    </button>
    <button class="navbtn" data-route="gwl">
      <span class="navbtn__ico">💧</span><span>MAT</span>
    </button>
    <button class="navbtn" data-route="records">
      <span class="navbtn__ico">📋</span><span>Data</span>
    </button>
  </nav>

  <div id="toast" class="toast" aria-live="polite"></div>

  <!-- jsPDF (vendored, offline) -->
  <script src="js/vendor/jspdf.umd.min.js"></script>
  <!-- App modules -->
  <script src="js/stations.js"></script>
  <script src="js/db.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/discharge.js"></script>
  <script src="js/gwl.js"></script>
  <script src="js/report.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
